<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MacDisk Analyzer</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💾</text></svg>">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
</head>
<body>
<div id="app">

  <!-- Header -->
  <header id="header">
    <span class="title">MacDisk Analyzer</span>
    <span class="subtitle">v1.0</span>
    <div id="agent-status" class="disconnected">
      <span class="dot"></span>
      <span class="label">agent disconnected</span>
    </div>
    <button id="lang-toggle" style="margin-left:12px; font-size:11px;">🌐 EN</button>
  </header>

  <!-- Sidebar -->
  <nav id="nav">
    <a href="#" data-view="welcome" class="active">~ inicio</a>
    <a href="#" data-view="dashboard">resumen</a>
    <a href="#" data-view="filetree">árbol</a>
    <a href="#" data-view="scanner">escáner</a>
    <a href="#" data-view="cleaner">limpieza</a>
  </nav>

  <!-- Main content -->
  <main id="main">

    <!-- Welcome -->
    <div id="view-welcome" class="view active">

      <!-- Agent connection status -->
      <div id="agent-banner" class="agent-banner disconnected">
        <div class="banner-icon">
          <span class="banner-dot"></span>
        </div>
        <div class="banner-content">
          <span class="banner-status" id="banner-status"></span>
          <span class="banner-desc"  id="banner-label"></span>
        </div>
        <div class="banner-action" id="banner-action"></div>
      </div>
      <!-- hidden anchor for typePrompt -->
      <span id="welcome-text" style="display:none"></span>

      <!-- Step-by-step guide — always visible -->
      <div class="guide">

        <p id="guide-how-title" class="section-title"></p>
        <p id="guide-how-body" class="guide-intro"></p>

        <p id="guide-setup-title" class="section-title" style="margin-top:24px;"></p>
        <div id="guide-steps" class="guide-steps"></div>

        <p id="guide-sections-title" class="section-title" style="margin-top:28px;"></p>
        <div id="guide-daily-block" style="margin-top:0; margin-bottom:28px; padding:12px 16px; border:1px solid var(--border); background:var(--surface); font-size:12px; line-height:1.8;">
          <span id="guide-daily-title" style="color:var(--accent2); font-weight:700;"></span>
          <span id="guide-daily" style="color:var(--muted); margin-left:8px;"></span>
        </div>        <div id="guide-sections" class="guide-sections"></div>

        <p id="guide-safe-title" class="section-title" style="margin-top:28px;"></p>
        <p id="guide-safe-body" class="guide-intro"></p>

      </div>
    </div>

    <!-- Dashboard -->
    <div id="view-dashboard" class="view">
      <p id="title-dashboard" class="section-title">Resumen del Disco</p>
      <div id="disk-card" class="disk-card">
        <div class="disk-nums">
          <div class="num-block">
            <span id="label-total" class="num-label">total</span>
            <span class="num-value" id="d-total">—</span>
          </div>
          <div class="num-block">
            <span id="label-used" class="num-label">usado</span>
            <span class="num-value warn" id="d-used">—</span>
          </div>
          <div class="num-block">
            <span id="label-free" class="num-label">libre</span>
            <span class="num-value accent" id="d-free">—</span>
          </div>
        </div>
        <div id="d-bar"></div>
      </div>
      <p id="title-dirs" class="section-title">Directorios Más Pesados</p>
      <div id="d-dirs"></div>
    </div>

    <!-- File Tree -->
    <div id="view-filetree" class="view">
      <p id="title-filetree" class="section-title">Árbol de Archivos</p>
      <p id="hint-filetree" class="muted" style="font-size:11px; margin-bottom:16px;"></p>
      <div id="tree-root" class="tree"></div>
    </div>

    <!-- Scanner -->
    <div id="view-scanner" class="view">
      <p id="title-scanner" class="section-title">Escáner de Basura</p>
      <p id="hint-scanner" class="muted" style="font-size:11px; margin-bottom:14px;"></p>
      <div style="margin-bottom:16px; display:flex; gap:10px;">
        <button id="btn-scan">[ ESCANEAR DISCO ]</button>
        <button id="btn-junk">[ DETECTAR BASURA ]</button>
      </div>
      <table class="junk-table">
        <thead>
          <tr>
            <th id="th-category">categoría</th>
            <th id="th-path">ruta</th>
            <th id="th-size" style="text-align:right">tamaño</th>
          </tr>
        </thead>
        <tbody id="junk-tbody"></tbody>
      </table>
    </div>

    <!-- Cleaner -->
    <div id="view-cleaner" class="view">
      <p id="title-cleaner" class="section-title">Limpieza</p>
      <p id="hint-cleaner" class="muted" style="font-size:11px; margin-bottom:14px;"></p>
      <div id="clean-list" class="clean-list"></div>
      <div class="clean-summary">
        <span class="selected-info" id="clean-count" data-count="0">0 elementos seleccionados</span>
        <span class="freed-info" id="clean-freed"></span>
        <button id="btn-clean" class="danger" style="margin-left:auto">[ ELIMINAR SELECCIONADOS ]</button>
      </div>
    </div>

  </main>

  <!-- Terminal log -->
  <div id="log-panel">
    <div class="log-line muted" id="log-ready">macdisk-analyzer listo.</div>
  </div>

</div>

<script src="js/i18n.js"></script>
<script src="js/terminal.js"></script>
<script src="js/dashboard.js"></script>
<script src="js/filetree.js"></script>
<script src="js/scanner.js"></script>
<script src="js/cleaner.js"></script>
<script src="js/main.js"></script>
</body>
</html>
